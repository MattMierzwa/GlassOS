<!-- index.html - COMPLETO COM TODAS AS NOVAS FUNCIONALIDADES -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassOS v1.1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop">
        <div id="desktop-icons"></div>
        <div id="window-container"></div>
        <div id="widgets-container"></div>
    </div>

    <div id="context-menu" class="glass-panel hidden">
        <div class="context-item" data-action="refresh">⟳ Atualizar</div>
        <div class="context-item" data-action="wallpaper"><span id="ctx-wallpaper-icon"></span> Alterar Papel de Parede</div>
        <div class="context-item" data-action="settings"><span id="ctx-settings-icon"></span> Configurações</div>
        <div class="context-item" data-action="widget">➕ Adicionar Widget</div>
        <div class="context-divider"></div>
        <div class="context-item" data-action="about">ℹ️ Sobre o GlassOS</div>
    </div>

    <div id="start-menu" class="glass-panel hidden">
        <div class="start-header">
            <div class="user-profile">
                <div class="user-avatar">👤</div>
                <span class="user-name">Usuário</span>
            </div>
            <div class="start-power">
                <button id="btn-restart" title="Reiniciar">⟳</button>
                <button id="btn-shutdown" title="Desligar">⏻</button>
            </div>
        </div>
        <div class="start-search">
            <input type="text" id="start-search-input" placeholder="🔍 Buscar aplicativos...">
        </div>
        <div class="start-apps" id="start-apps"></div>
    </div>

    <div id="alt-tab-overlay" class="hidden">
        <div id="alt-tab-list"></div>
    </div>

    <div id="shutdown-screen" class="hidden">
        <div class="shutdown-content">
            <div class="shutdown-spinner"></div>
            <p id="shutdown-text">Desligando...</p>
        </div>
    </div>

    <div id="lock-screen" class="hidden">
        <div class="lock-screen-content">
            <div class="lock-clock" id="lock-clock">00:00</div>
            <div class="lock-date" id="lock-date">00/00/0000</div>
            <div class="lock-input-area">
                <input type="password" id="lock-password" placeholder="Senha (1234)..." maxlength="20">
                <button id="lock-unlock">🔓 Desbloquear</button>
                <button id="lock-shutdown">⏻ Desligar</button>
            </div>
            <div id="lock-error" class="lock-error hidden">Senha incorreta!</div>
        </div>
    </div>

    <div id="notification-center" class="glass-panel hidden">
        <div class="notification-header">
            <h3><span id="notif-header-icon"></span> Notificações</h3>
            <button id="notif-clear-all">Limpar tudo</button>
        </div>
        <div id="notification-list"></div>
        <div class="notification-footer">
            <button id="notif-focus-mode" class="btn-focus-mode">🌙 Modo Foco</button>
        </div>
    </div>

    <div id="clipboard-manager" class="glass-panel hidden">
        <div class="clipboard-header">
            <h3><span id="clipboard-header-icon"></span> Área de Transferência</h3>
            <button id="clipboard-clear">Limpar</button>
        </div>
        <div id="clipboard-list"></div>
    </div>

    <div id="global-search" class="hidden">
        <div class="search-box glass-panel">
            <input type="text" id="global-search-input" placeholder="🔍 Buscar apps, arquivos, configurações..." autofocus>
            <div id="global-search-results"></div>
        </div>
    </div>

    <div id="update-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3>🔄 Atualização Disponível</h3>
            <p id="update-content">Nova versão do GlassOS disponível!</p>
            <div class="modal-actions">
                <button id="update-later">Depois</button>
                <button id="update-install" class="primary">Instalar</button>
            </div>
        </div>
    </div>

    <div id="lazy-loader" class="hidden">
        <div class="loader-spinner"></div>
    </div>

    <div id="toast-container"></div>

    <!-- Overlay de Brilho (simulação) -->
    <div id="brightness-overlay"></div>

    <!-- Painel de Configurações Rápidas -->
    <div id="quick-settings-panel" class="glass-panel hidden">
        <div class="qs-header">
            <h3>Configurações Rápidas</h3>
            <button id="qs-close" title="Fechar">×</button>
        </div>
        
        <!-- Sliders -->
        <div class="qs-section">
            <div class="qs-item">
                <span class="qs-icon" id="qs-volume-icon"></span>
                <div class="qs-slider-container">
                    <input type="range" id="qs-volume" min="0" max="100" value="50">
                    <span id="qs-volume-val">50%</span>
                </div>
            </div>
            
            <div class="qs-item">
                <span class="qs-icon" id="qs-brightness-icon"></span>
                <div class="qs-slider-container">
                    <input type="range" id="qs-brightness" min="0" max="100" value="100">
                    <span id="qs-brightness-val">100%</span>
                </div>
            </div>
        </div>
        
        <!-- Toggles Grid -->
        <div class="qs-grid">
            <button class="qs-toggle" id="qs-wifi" data-state="false">
                <span class="qs-toggle-icon" id="qs-wifi-icon"></span>
                <span class="qs-toggle-label">Wi-Fi</span>
            </button>
            
            <button class="qs-toggle" id="qs-bluetooth" data-state="false">
                <span class="qs-toggle-icon" id="qs-bluetooth-icon"></span>
                <span class="qs-toggle-label">Bluetooth</span>
            </button>
            
            <button class="qs-toggle" id="qs-airplane" data-state="false">
                <span class="qs-toggle-icon" id="qs-airplane-icon"></span>
                <span class="qs-toggle-label">Avião</span>
            </button>
            
            <button class="qs-toggle" id="qs-focus" data-state="false">
                <span class="qs-toggle-icon" id="qs-focus-icon"></span>
                <span class="qs-toggle-label">Foco</span>
            </button>
            
            <button class="qs-toggle" id="qs-power-save" data-state="false">
                <span class="qs-toggle-icon" id="qs-power-icon"></span>
                <span class="qs-toggle-label">Energia</span>
            </button>
            
            <button class="qs-toggle" id="qs-settings-btn" data-state="false">
                <span class="qs-toggle-icon" id="qs-settings-icon"></span>
                <span class="qs-toggle-label">Ajustes</span>
            </button>
        </div>
    </div>

    <div class="snap-overlay" id="snap-overlay">
        <div class="snap-zone half-left" data-layout="half-left"></div>
        <div class="snap-zone half-right" data-layout="half-right"></div>
    </div>

    <div id="taskbar">
        <button id="btn-start" title="Menu Iniciar">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                <rect x="1" y="1" width="8" height="8" rx="1.5"/>
                <rect x="11" y="1" width="8" height="8" rx="1.5"/>
                <rect x="1" y="11" width="8" height="8" rx="1.5"/>
                <rect x="11" y="11" width="8" height="8" rx="1.5"/>
            </svg>
        </button>
        <div id="taskbar-apps"></div>
        <div id="taskbar-tray">
            <span id="tray-clipboard" title="Área de Transferência"></span>
            <span id="tray-notifications" title="Notificações"></span>
            <button id="btn-sound-toggle" class="taskbar-icon-btn" title="Som" style="background:none;border:none;cursor:pointer;color:var(--text-primary);padding:4px 8px;display:inline-flex;align-items:center;">
                <svg id="sound-icon-mute" viewBox="0 0 24 24" style="width:18px;height:18px;display:none" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                <svg id="sound-icon-on" viewBox="0 0 24 24" style="width:18px;height:18px;display:none" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
            <!-- Novo design do relógio com duas linhas -->
            <div id="tray-clock-container" class="tray-clock-wrapper" title="Configurações Rápidas">
                <div class="tray-time" id="tray-time">00:00</div>
                <div class="tray-date" id="tray-date">00/00</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
